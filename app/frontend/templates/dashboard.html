<!DOCTYPE html>
<head>

<title>Smart AI Attendance</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="/static/style.css">

</head>
<body class="bg-gradient-to-br from-gray-900 to-black text-white">

<div class="max-w-6xl mx-auto p-10">

<h1 class="text-5xl font-bold text-center mb-10 text-cyan-400">
Smart AI Attendance System
</h1>


<div class="grid grid-cols-3 gap-6 mb-10">

<div class="bg-gray-800 p-6 rounded-xl shadow-xl text-center">

<h2 class="text-gray-400 text-sm">Total Students</h2>
<p id="studentsCount" class="text-3xl font-bold text-cyan-400">--</p>

</div>

<div class="bg-gray-800 p-6 rounded-xl shadow-xl text-center">

<h2 class="text-gray-400 text-sm">Students Detected</h2>
<p id="detectedCount" class="text-3xl font-bold text-green-400">--</p>

</div>

<div class="bg-gray-800 p-6 rounded-xl shadow-xl text-center">

<h2 class="text-gray-400 text-sm">System Status</h2>
<p class="text-green-400 text-xl">Ready</p>

</div>

</div>


<div class="grid grid-cols-2 gap-10">

<div class="bg-gray-800 p-8 rounded-xl shadow-xl">

<h2 class="text-2xl mb-6 text-cyan-400">Live Recognition</h2>

<button onclick="startLive()"
class="bg-cyan-500 hover:bg-cyan-400 px-6 py-3 rounded-lg text-black font-bold w-full transition">

Start Camera Recognition

</button>

<p class="text-gray-400 text-sm mt-3">
Camera runs for 10 seconds and logs attendance automatically
</p>

</div>


<div class="bg-gray-800 p-8 rounded-xl shadow-xl">

<h2 class="text-2xl mb-6 text-purple-400">Process CCTV Video</h2>

<input type="file" id="videoFile"
class="bg-gray-700 p-3 rounded-lg w-full mb-4">

<button onclick="uploadVideo()"
class="bg-purple-500 hover:bg-purple-400 px-6 py-3 rounded-lg text-black font-bold w-full">

Upload & Process Video

</button>

</div>

</div>


<div class="mt-12 bg-gray-800 p-8 rounded-xl shadow-xl">

<h2 class="text-2xl mb-6 text-green-400">Attendance Log</h2>

<table class="w-full text-left">

<thead>

<tr class="border-b border-gray-600">

<th class="p-3">Name</th>
<th class="p-3">Date</th>
<th class="p-3">Time</th>

</tr>

</thead>

<tbody id="attendanceTable">

</tbody>

</table>

</div>

</div>


<script>

async function startLive(){

await fetch("/recognize-live",{method:"POST"})

alert("Camera started. Please face the camera.")

}


async function uploadVideo(){

let file = document.getElementById("videoFile").files[0]

let form = new FormData()

form.append("file",file)

await fetch("/upload-video",{method:"POST",body:form})

alert("Video uploaded. Processing started.")

}


async function loadAttendance(){

const res = await fetch("/attendance")

const data = await res.json()

let table = document.getElementById("attendanceTable")

table.innerHTML=""

data.forEach(row => {

table.innerHTML += `
<tr class="border-b border-gray-700">
<td class="p-3">${row.Name}</td>
<td class="p-3">${row.Date}</td>
<td class="p-3">${row.Time}</td>
</tr>
`

})

document.getElementById("detectedCount").innerText = data.length

}


async function loadStudents(){

const res = await fetch("/students")

const data = await res.json()

document.getElementById("studentsCount").innerText = data.total_students

}


setInterval(loadAttendance,2000)

loadStudents()

</script>

</body>
</html>
<script src="/static/app.js"></script>
