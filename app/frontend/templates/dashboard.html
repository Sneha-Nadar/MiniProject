<!DOCTYPE html>
<html>

<head>
<title>Smart Attendance System</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white">

<div class="p-10">

<h1 class="text-4xl font-bold mb-6 text-center">
Smart Face Recognition Attendance
</h1>

<div class="grid grid-cols-2 gap-10">

<div class="bg-gray-800 p-6 rounded-xl shadow-xl">

<h2 class="text-xl mb-4">Live Recognition</h2>

<button onclick="startLive()" 
class="bg-green-500 px-6 py-3 rounded-lg text-black font-bold">
Start Camera (10 sec)
</button>

<p class="mt-3 text-sm text-gray-400">
Camera opens for 10 seconds and logs attendance
</p>

</div>

<div class="bg-gray-800 p-6 rounded-xl shadow-xl">

<h2 class="text-xl mb-4">Process CCTV Video</h2>

<input type="file" id="videoFile" class="mb-3">

<button onclick="uploadVideo()" 
class="bg-blue-500 px-6 py-3 rounded-lg text-black font-bold">
Upload & Process
</button>

</div>

</div>


<div class="mt-12">

<h2 class="text-2xl mb-4">Today's Attendance</h2>

<table class="w-full bg-gray-800 rounded-xl">

<thead>

<tr class="text-left border-b border-gray-600">

<th class="p-3">Name</th>
<th class="p-3">Date</th>
<th class="p-3">Time</th>

</tr>

</thead>

<tbody id="attendanceTable">

</tbody>

</table>

</div>

</div>

<script>

async function startLive(){

await fetch("/recognize-live",{method:"POST"})

alert("Camera started")

}

async function uploadVideo(){

let file = document.getElementById("videoFile").files[0]

let form = new FormData()

form.append("file",file)

await fetch("/upload-video",{method:"POST",body:form})

alert("Video uploaded. Processing started")

}

async function loadAttendance(){

const res = await fetch("/attendance")

const data = await res.json()

let table = document.getElementById("attendanceTable")

table.innerHTML=""

data.forEach(row => {

table.innerHTML += `
<tr class="border-b border-gray-700">
<td class="p-3">${row.Name}</td>
<td class="p-3">${row.Date}</td>
<td class="p-3">${row.Time}</td>
</tr>
`

})

}

setInterval(loadAttendance,2000)

</script>

</body>
</html>
